<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You - Questionnaire Submitted</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1A1A1F;
      color: #F5F5F5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 500px;
      text-align: center;
    }

    .success-icon {
      font-size: 64px;
      margin-bottom: 24px;
      animation: bounce 0.6s ease-out;
    }

    @keyframes bounce {
      0% {
        transform: scale(0.3);
        opacity: 0;
      }
      50% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    h1 {
      font-size: 32px;
      margin-bottom: 16px;
      color: #FFFFFF;
    }

    .subtitle {
      font-size: 16px;
      color: #B8B8C4;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .details {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
      text-align: left;
    }

    .detail-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .detail-item:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: #B8B8C4;
      font-size: 13px;
    }

    .detail-value {
      color: #7C3AED;
      font-weight: 600;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    button {
      flex: 1;
      padding: 14px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Space Grotesk', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7C3AED 0%, #9F5FFF 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(124, 58, 237, 0.3);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #F5F5F5;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .message {
      font-size: 13px;
      color: #B8B8C4;
      line-height: 1.6;
    }

    .countdown {
      margin-top: 16px;
      color: #7A7A8A;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="success-icon">✅</div>
    <h1>Thank You!</h1>
    <p class="subtitle">Your questionnaire has been submitted successfully.</p>

    <div class="details">
      <div class="detail-item">
        <span class="detail-label">Submission Time</span>
        <span class="detail-value" id="submitTime">Just now</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Response ID</span>
        <span class="detail-value" id="responseId">-</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn-primary" onclick="goBack()">← Go Back</button>
      <button class="btn-secondary" onclick="viewResponses()">View Responses</button>
    </div>

    <p class="message">
      We've received your answers and will review them shortly. 
      If you have any questions, please don't hesitate to reach out.
    </p>

    <div class="countdown">Redirecting in <span id="countdown">5</span> seconds...</div>
  </div>

  <script>
    function goBack() {
      window.location.href = '/index.html';
    }

    function viewResponses() {
      window.location.href = '/responses.html';
    }

    // Set submission time
    const now = new Date();
    document.getElementById('submitTime').textContent = now.toLocaleTimeString();
    document.getElementById('responseId').textContent = Date.now();

    // Countdown redirect
    let count = 5;
    const interval = setInterval(() => {
      count--;
      document.getElementById('countdown').textContent = count;
      if (count === 0) {
        clearInterval(interval);
        goBack();
      }
    }, 1000);
  </script>
</body>
</html>
